<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Email/Password – Get ID Token</title>
  <!-- Firebase modular SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

    // ---------- 🔁 REPLACE WITH YOUR FIREBASE CONFIG ----------
    const firebaseConfig = {
      apiKey: "AIzaSyAiUmRkyrhwLZclMQmkohjIAuHQw6QE0sA",
      authDomain: "myproject-42419.firebaseapp.com",
      projectId: "myproject-42419",
      storageBucket: "myproject-42419.appspot.com",
      messagingSenderId: "870910229378",
      appId: "1:870910229378:web:abfc7f609c20282de32d9b"
    };
    // ----------------------------------------------------------

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ---------- DOM elements ----------
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const signUpBtn = document.getElementById('signUpBtn');
    const signInBtn = document.getElementById('signInBtn');
    const signOutBtn = document.getElementById('signOutBtn');
    const tokenDisplay = document.getElementById('tokenDisplay');
    const userInfo = document.getElementById('userInfo');
    const authForm = document.getElementById('authForm');

    // ---------- Helper: display token & user ----------
    async function displayUserAndToken(user) {
      if (user) {
        try {
          const idToken = await user.getIdToken();
          tokenDisplay.textContent = idToken;
          // const response = await fetch('http://localhost:8000/auth/firebase/', {
          //   method: 'POST',
          //   headers: {
          //     'Content-Type': 'application/json',
          //     'Authorization': `Bearer ${idToken}`
          //   },
          //   body: JSON.stringify({
          //     idToken: idToken
          //   }),
          // });

          // const data = await response.json();
          // console.log('Backend response:', data);
          userInfo.innerHTML = `
            <p><strong>UID:</strong> ${user.uid}</p>
            <p><strong>Email:</strong> ${user.email}</p>
            <p><strong>Email verified:</strong> ${user.emailVerified ? '✅' : '❌'}</p>
            <p><button id="refreshTokenBtn" class="btn-small">⟳ Refresh token</button></p>
          `;
          // Add refresh token listener
          document.getElementById('refreshTokenBtn')?.addEventListener('click', async () => {
            const freshToken = await user.getIdToken(true);
            displayUserAndToken(user);
          });
        } catch (error) {
          tokenDisplay.textContent = `Error getting token: ${error.message}`;
        }
      } else {
        tokenDisplay.textContent = '🔒 No user signed in.';
        userInfo.innerHTML = '';
      }
    }

    // ---------- Sign up ----------
    async function handleSignUp(e) {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        tokenDisplay.textContent = '⚠️ Email and password are required.';
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        // User is automatically signed in after sign-up
        displayUserAndToken(userCredential.user);
      } catch (error) {
        console.error('Sign up error:', error);
        switch (error.code) {
          case 'auth/email-already-in-use':
            tokenDisplay.textContent = '❌ This email is already registered. Please sign in.';
            break;
          case 'auth/weak-password':
            tokenDisplay.textContent = '❌ Password should be at least 6 characters.';
            break;
          case 'auth/invalid-email':
            tokenDisplay.textContent = '❌ Invalid email address.';
            break;
          default:
            tokenDisplay.textContent = `Error: ${error.message}`;
        }
      }
    }

    // ---------- Sign in ----------
    async function handleSignIn(e) {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        tokenDisplay.textContent = '⚠️ Email and password are required.';
        return;
      }

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        displayUserAndToken(userCredential.user);
      } catch (error) {
        console.error('Sign in error:', error);
        switch (error.code) {
          case 'auth/user-not-found':
            tokenDisplay.textContent = '❌ No user found with this email.';
            break;
          case 'auth/wrong-password':
            tokenDisplay.textContent = '❌ Incorrect password.';
            break;
          case 'auth/invalid-credential':
            tokenDisplay.textContent = '❌ Invalid email or password.';
            break;
          case 'auth/invalid-email':
            tokenDisplay.textContent = '❌ Invalid email address.';
            break;
          default:
            tokenDisplay.textContent = `Error: ${error.message}`;
        }
      }
    }

    // ---------- Sign out ----------
    async function handleSignOut() {
      try {
        await signOut(auth);
        // UI will update via onAuthStateChanged
      } catch (error) {
        console.error('Sign out error:', error);
        tokenDisplay.textContent = `Error signing out: ${error.message}`;
      }
    }

    // ---------- Auth state observer ----------
    onAuthStateChanged(auth, (user) => {
      displayUserAndToken(user);
      // Clear form fields when signed out
      if (!user) {
        emailInput.value = '';
        passwordInput.value = '';
      }
    });

    // ---------- Event listeners ----------
    signUpBtn.addEventListener('click', handleSignUp);
    signInBtn.addEventListener('click', handleSignIn);
    signOutBtn.addEventListener('click', handleSignOut);

    // Prevent form from submitting normally (no page reload)
    authForm.addEventListener('submit', (e) => e.preventDefault());
  </script>

  <style>
    /* modern, clean styling – similar to previous but adapted for forms */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0b7b8a 0%, #2c3e50 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      padding: 40px;
      max-width: 800px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #444;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      transition: border 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #0b7b8a;
      box-shadow: 0 0 0 3px rgba(11,123,138,0.1);
    }

    .button-group {
      display: flex;
      gap: 16px;
      margin: 24px 0 16px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      flex: 1 1 auto;
    }

    .btn-primary {
      background: #0b7b8a;
      color: white;
    }

    .btn-primary:hover {
      background: #09646f;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(11,123,138,0.3);
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #5a6268;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .btn-small {
      padding: 6px 16px;
      font-size: 14px;
      background: #e9ecef;
      color: #495057;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 8px;
    }

    .card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 24px;
      margin-top: 32px;
    }

    .token-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    #tokenDisplay {
      background: #2d3748;
      color: #e2e8f0;
      padding: 16px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }

    #userInfo {
      margin-top: 24px;
      border-top: 1px solid #dee2e6;
      padding-top: 24px;
    }

    .footer-note {
      margin-top: 24px;
      color: #868e96;
      font-size: 0.85rem;
      text-align: center;
    }

    .divider {
      margin: 20px 0;
      text-align: center;
      color: #999;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 45%;
      height: 1px;
      background: #ddd;
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📧 Firebase Email/Password Auth</h1>
    <p class="subtitle">Sign up or sign in with email & password to get your Firebase ID token</p>

    <form id="authForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="user@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <div class="button-group">
        <button type="button" id="signUpBtn" class="btn btn-primary">Sign Up</button>
        <button type="button" id="signInBtn" class="btn btn-secondary">Sign In</button>
        <button type="button" id="signOutBtn" class="btn btn-danger">Sign Out</button>
      </div>
    </form>

    <div class="card">
      <div class="token-header">
        <h3>ID Token (JWT)</h3>
      </div>
      <div id="tokenDisplay">🔒 No user signed in.</div>
    </div>

    <div id="userInfo"></div>

    <div class="footer-note">
      ⚠️ Keep your ID token secret! Do not share or expose it publicly.<br>
      🔧 Make sure Email/Password is enabled in Firebase Authentication.
    </div>
  </div>
</body>
</html>
